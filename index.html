<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>大脑转储</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --transition: 0.25s ease; }

    /* Dark theme */
    [data-theme="dark"] {
      --bg: #0f172a; --surface: #1e293b; --surface2: #253349;
      --border: #334155; --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
      --input-bg: #1e293b; --hover: rgba(255,255,255,0.04);
    }
    /* Light theme */
    [data-theme="light"] {
      --bg: #f1f5f9; --surface: #ffffff; --surface2: #f8fafc;
      --border: #e2e8f0; --text: #1e293b; --text2: #475569; --text3: #94a3b8;
      --input-bg: #f8fafc; --hover: rgba(0,0,0,0.03);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; min-height: 100dvh;
      transition: background var(--transition), color var(--transition);
    }
    .app { max-width: 600px; margin: 0 auto; padding: 0 16px 100px; }

    /* Login */
    .login-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px;
    }
    .login-screen.hidden { display: none; }
    .login-logo { font-size: 56px; margin-bottom: 16px; }
    .login-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .login-sub { font-size: 14px; color: var(--text3); margin-bottom: 32px; text-align: center; line-height: 1.6; }
    .login-btn {
      display: flex; align-items: center; gap: 10px;
      background: #fff; color: #333;
      border: none; border-radius: 12px;
      padding: 14px 28px; font-size: 15px;
      font-weight: 600; cursor: pointer;
      transition: all 0.15s; margin-bottom: 12px;
      width: 280px; justify-content: center;
    }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .login-btn.email-login { background: var(--accent); color: #fff; }
    .login-divider { font-size: 12px; color: var(--text3); margin: 16px 0; display: flex; align-items: center; gap: 12px; width: 280px; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .login-email-form { width: 280px; }
    .login-input {
      width: 100%; padding: 12px 16px;
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-size: 14px; outline: none; margin-bottom: 10px;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-input::placeholder { color: var(--text3); }
    .login-error { color: #ef4444; font-size: 12px; margin-bottom: 8px; min-height: 16px; }
    .login-mode-switch { background: none; border: none; color: var(--accent); font-size: 13px; cursor: pointer; margin-top: 8px; }
    .remember-row { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
    .remember-row input { accent-color: var(--accent); }
    .remember-row label { font-size: 12px; color: var(--text2); cursor: pointer; }

    /* Header */
    .header { padding: 20px 0 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; transition: background var(--transition); }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header-date { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1.5px solid var(--border); background: transparent;
      color: var(--text2); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--text); }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; object-fit: cover; }
    .user-menu { position: relative; }
    .user-dropdown {
      position: absolute; right: 0; top: 44px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px; min-width: 180px;
      display: none; z-index: 20; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .user-dropdown.open { display: block; }
    .user-dropdown-item {
      display: block; width: 100%; padding: 10px 12px;
      border: none; background: none; color: var(--text2);
      font-size: 13px; text-align: left; cursor: pointer;
      border-radius: 8px; transition: background 0.15s;
    }
    .user-dropdown-item:hover { background: var(--hover); color: var(--text); }
    .user-dropdown-name { padding: 8px 12px; font-size: 13px; color: var(--text); font-weight: 600; border-bottom: 1px solid var(--border); margin-bottom: 4px; }

    /* Sync */
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .sync-dot.synced { background: #10b981; }
    .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
    .sync-dot.offline { background: #ef4444; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Stats */
    .stats { display: flex; gap: 8px; padding: 12px 0; overflow-x: auto; scrollbar-width: none; }
    .stats::-webkit-scrollbar { display: none; }
    .stat-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px;
      font-size: 12px; color: var(--text2); white-space: nowrap;
      cursor: pointer; transition: all 0.2s;
    }
    .stat-chip:hover, .stat-chip.active { border-color: var(--text2); color: var(--text); }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Input */
    .input-box { background: var(--surface); border: 2px solid var(--border); border-radius: 16px; margin: 12px 0 16px; transition: border-color 0.2s, background var(--transition); }
    .input-box:focus-within { border-color: var(--accent); }
    .input-box textarea {
      width: 100%; background: transparent; border: none;
      padding: 16px 16px 8px; font-size: 15px; color: var(--text);
      outline: none; font-family: inherit; resize: none;
      min-height: 56px; line-height: 1.5;
    }
    .input-box textarea::placeholder { color: var(--text3); }
    .input-bottom { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px 10px; }
    .input-options { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; align-items: center; }
    .input-options::-webkit-scrollbar { display: none; }
    .opt-pill {
      border: 1.5px solid var(--border); background: transparent;
      border-radius: 20px; padding: 5px 12px;
      font-size: 12px; cursor: pointer; color: var(--text3);
      white-space: nowrap; transition: all 0.2s;
    }
    .opt-pill.active { font-weight: 600; }
    .opt-pill[data-cat="work"].active { border-color: #3b82f6; background: rgba(59,130,246,0.12); color: #3b82f6; }
    .opt-pill[data-cat="life"].active { border-color: #10b981; background: rgba(16,185,129,0.12); color: #10b981; }
    .opt-pill[data-cat="idea"].active { border-color: #f59e0b; background: rgba(245,158,11,0.12); color: #f59e0b; }
    .opt-pill[data-cat="learn"].active { border-color: #6366f1; background: rgba(99,102,241,0.12); color: #6366f1; }
    .opt-pill[data-cat="ai"].active { border-color: #8b5cf6; background: rgba(139,92,246,0.12); color: #8b5cf6; }
    .priority-group { display: flex; gap: 2px; margin-left: 4px; }
    .pri-btn {
      width: 22px; height: 22px; border-radius: 6px;
      border: 1.5px solid var(--border); background: transparent;
      font-size: 10px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; color: var(--text3);
    }
    .pri-btn.active.h { border-color: #ef4444; background: rgba(239,68,68,0.15); color: #ef4444; }
    .pri-btn.active.m { border-color: #f59e0b; background: rgba(245,158,11,0.15); color: #f59e0b; }
    .pri-btn.active.l { border-color: #10b981; background: rgba(16,185,129,0.15); color: #10b981; }
    .send-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); border: none;
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
    [data-theme="dark"] { --accent: #6366f1; }
    [data-theme="light"] { --accent: #4f46e5; }

    /* Filter */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-tab {
      background: transparent; border: none;
      padding: 6px 12px; font-size: 12px;
      color: var(--text3); cursor: pointer;
      border-radius: 8px; white-space: nowrap; transition: all 0.2s;
    }
    .filter-tab:hover { color: var(--text2); background: var(--hover); }
    .filter-tab.active { color: var(--text); background: var(--surface); }

    /* Cards */
    .card-list { display: flex; flex-direction: column; gap: 8px; }
    .card {
      background: var(--surface); border-radius: 14px;
      padding: 14px 16px; border-left: 4px solid var(--border);
      animation: fadeUp 0.2s ease; position: relative;
      transition: background var(--transition);
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } }
    .card[data-cat="work"] { border-left-color: #3b82f6; }
    .card[data-cat="life"] { border-left-color: #10b981; }
    .card[data-cat="idea"] { border-left-color: #f59e0b; }
    .card[data-cat="learn"] { border-left-color: #6366f1; }
    .card[data-cat="ai"] { border-left-color: #8b5cf6; }
    .card-top { display: flex; align-items: flex-start; gap: 10px; }
    .card-text { font-size: 14px; line-height: 1.6; color: var(--text); word-break: break-word; white-space: pre-wrap; flex: 1; min-width: 0; }
    .card-text.done { text-decoration: line-through; color: var(--text3); }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .card-left { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .card-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; cursor: pointer; transition: opacity 0.15s; }
    .card-tag:hover { opacity: 0.8; }
    .card-tag.work { background: rgba(59,130,246,0.12); color: #3b82f6; }
    .card-tag.life { background: rgba(16,185,129,0.12); color: #10b981; }
    .card-tag.idea { background: rgba(245,158,11,0.12); color: #f59e0b; }
    .card-tag.learn { background: rgba(99,102,241,0.12); color: #6366f1; }
    .card-tag.ai { background: rgba(139,92,246,0.12); color: #8b5cf6; }
    .pri-badge { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 6px; letter-spacing: 0.5px; }
    .pri-badge.h { background: #ef4444; color: #fff; }
    .pri-badge.m { background: rgba(245,158,11,0.18); color: #f59e0b; }
    .pri-badge.l { background: rgba(16,185,129,0.15); color: #10b981; }
    .card-time { font-size: 11px; color: var(--text3); }
    .card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .card:hover .card-actions { opacity: 1; }
    .card-action-btn {
      width: 28px; height: 28px; border-radius: 8px;
      border: none; background: transparent;
      color: var(--text3); font-size: 14px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all 0.15s;
    }
    .card-action-btn:hover { background: var(--hover); color: var(--text); }
    .card-action-btn.del:hover { color: #ef4444; background: rgba(239,68,68,0.08); }
    .todo-check {
      width: 20px; height: 20px; border: 2px solid var(--text3);
      border-radius: 50%; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; margin-top: 2px;
    }
    .todo-check:hover { border-color: var(--accent); }
    .todo-check.checked { background: var(--accent); border-color: transparent; }
    .todo-check.checked::after { content: "✓"; color: #fff; font-size: 12px; font-weight: 700; }

    /* Category picker popup */
    .cat-picker {
      position: absolute; top: 40px; left: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 6px; z-index: 30;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2); display: none;
    }
    .cat-picker.open { display: block; }
    .cat-picker-item {
      display: block; width: 100%; padding: 8px 14px;
      border: none; background: none; color: var(--text2);
      font-size: 12px; text-align: left; cursor: pointer;
      border-radius: 6px; white-space: nowrap; transition: background 0.15s;
    }
    .cat-picker-item:hover { background: var(--hover); color: var(--text); }

    /* Empty */
    .empty { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 14px; }
    .empty-icon { font-size: 40px; margin-bottom: 8px; }

    /* Date separator */
    .date-sep { font-size: 12px; color: var(--text3); font-weight: 600; padding: 16px 0 8px; display: flex; align-items: center; gap: 8px; }
    .date-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Summary */
    .summary-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; justify-content: center; align-items: flex-end; }
    .summary-overlay.open { display: flex; }
    .summary-panel {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 600px; max-height: 85vh;
      overflow-y: auto; padding: 24px 20px 40px;
      animation: slideUp 0.3s ease; transition: background var(--transition);
    }
    @keyframes slideUp { from { transform: translateY(100%); } }
    .summary-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .summary-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .summary-sub { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
    .summary-section { margin-bottom: 16px; }
    .summary-section h3 { font-size: 13px; color: var(--text2); font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .summary-item { font-size: 13px; color: var(--text); padding: 8px 12px; background: var(--hover); border-radius: 8px; margin-bottom: 4px; line-height: 1.5; }
    .summary-count { font-size: 11px; background: var(--border); border-radius: 10px; padding: 1px 8px; color: var(--text2); }
    .insight-box {
      background: var(--surface2); border-radius: 14px;
      padding: 16px; margin-top: 12px;
      border: 1px solid var(--border);
      line-height: 1.8; font-size: 13px; color: var(--text);
    }
    .insight-box h4 { font-size: 14px; margin-bottom: 8px; }
    .insight-line { padding: 4px 0; border-bottom: 1px solid var(--border); }
    .insight-line:last-child { border: none; }
    .action-item {
      font-size: 13px; color: var(--text);
      padding: 10px 12px; background: var(--hover);
      border-radius: 10px; margin-bottom: 6px;
      border-left: 3px solid var(--accent); line-height: 1.5;
    }
    .action-label { font-size: 10px; color: var(--accent); font-weight: 600; margin-bottom: 2px; }
    .close-summary {
      display: block; width: 100%; padding: 14px;
      background: var(--border); border: none;
      border-radius: 12px; color: var(--text);
      font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 16px;
    }
    .close-summary:hover { opacity: 0.8; }

    /* Edit */
    .edit-textarea { width: 100%; background: transparent; border: 2px solid var(--accent); border-radius: 10px; padding: 10px 12px; font-size: 14px; color: var(--text); outline: none; font-family: inherit; resize: none; min-height: 60px; line-height: 1.5; }
    .edit-btns { display: flex; gap: 8px; margin-top: 8px; }
    .edit-btn { padding: 6px 16px; border-radius: 8px; border: none; font-size: 12px; cursor: pointer; font-weight: 600; }
    .edit-save { background: var(--accent); color: #fff; }
    .edit-cancel { background: var(--border); color: var(--text2); }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; font-size: 13px; color: var(--text); z-index: 200; opacity: 0; transition: opacity 0.3s; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .toast.show { opacity: 1; }

    @media (hover: none) { .card-actions { opacity: 1; } }
    @media (max-width: 420px) { .opt-pill { padding: 4px 10px; font-size: 11px; } }
  </style>
</head>
<body>
  <!-- Login -->
  <div class="login-screen" id="loginScreen">
    <div class="login-logo">🧠</div>
    <div class="login-title">大脑转储</div>
    <div class="login-sub">把脑子里的东西全倒出来<br>登录后可跨设备同步数据</div>
    <button class="login-btn" onclick="loginGoogle()" style="background:#fff;color:#333;">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google 登录
    </button>
    <div class="login-divider">或</div>
    <div class="login-email-form">
      <div class="login-error" id="loginError"></div>
      <input class="login-input" type="email" id="loginEmail" placeholder="邮箱地址">
      <input class="login-input" type="password" id="loginPassword" placeholder="密码（至少6位）">
      <div class="remember-row">
        <input type="checkbox" id="rememberMe" checked>
        <label for="rememberMe">记住我</label>
      </div>
      <button class="login-btn email-login" onclick="loginEmail()">登录</button>
      <button class="login-mode-switch" id="loginModeSwitch" onclick="toggleLoginMode()">没有账号？点击注册</button>
    </div>
  </div>

  <!-- App -->
  <div class="app" id="mainApp" style="display:none;">
    <div class="header">
      <div class="header-top">
        <div>
          <h1>🧠 大脑转储</h1>
          <div class="header-date" id="headerDate"></div>
        </div>
        <div class="header-actions">
          <span id="syncStatus" style="font-size:11px;color:var(--text3);display:flex;align-items:center;">
            <span class="sync-dot synced"></span>已同步
          </span>
          <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">🌙</button>
          <button class="icon-btn" onclick="showSummary()" title="今日总结">📊</button>
          <button class="icon-btn" onclick="exportData()" title="导出">📤</button>
          <div class="user-menu">
            <img class="user-avatar" id="userAvatar" src="" alt="" onclick="toggleUserMenu()" style="display:none;">
            <button class="icon-btn" id="userBtn" onclick="toggleUserMenu()" style="display:none;">👤</button>
            <div class="user-dropdown" id="userDropdown">
              <div class="user-dropdown-name" id="userName"></div>
              <button class="user-dropdown-item" onclick="showSummary();toggleUserMenu()">📊 今日总结</button>
              <button class="user-dropdown-item" onclick="exportData();toggleUserMenu()">📤 导出数据</button>
              <button class="user-dropdown-item" onclick="logout()">🚪 退出登录</button>
            </div>
          </div>
        </div>
      </div>
      <div class="stats" id="statsBar"></div>
    </div>

    <div class="input-box">
      <textarea id="dumpInput" placeholder="脑子里在想什么？随便写，一行一条..." rows="2"></textarea>
      <div class="input-bottom">
        <div class="input-options">
          <button class="opt-pill active" data-cat="work" onclick="setCat('work')">💼 工作</button>
          <button class="opt-pill" data-cat="life" onclick="setCat('life')">🏠 生活</button>
          <button class="opt-pill" data-cat="idea" onclick="setCat('idea')">💡 想法</button>
          <button class="opt-pill" data-cat="learn" onclick="setCat('learn')">📚 学习</button>
          <button class="opt-pill" data-cat="ai" onclick="setCat('ai')">🤖 AI试试</button>
          <div class="priority-group">
            <button class="pri-btn h" onclick="setPri('h')" title="高优先级">H</button>
            <button class="pri-btn m active" onclick="setPri('m')" title="中优先级">M</button>
            <button class="pri-btn l" onclick="setPri('l')" title="低优先级">L</button>
          </div>
        </div>
        <button class="send-btn" onclick="addEntry()">↑</button>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-tab active" data-filter="all">全部</button>
      <button class="filter-tab" data-filter="work">💼 工作</button>
      <button class="filter-tab" data-filter="life">🏠 生活</button>
      <button class="filter-tab" data-filter="idea">💡 想法</button>
      <button class="filter-tab" data-filter="learn">📚 学习</button>
      <button class="filter-tab" data-filter="ai">🤖 AI试试</button>
    </div>

    <div class="card-list" id="cardList"></div>
  </div>

  <div class="summary-overlay" id="summaryOverlay" onclick="if(event.target===this)closeSummary()">
    <div class="summary-panel" id="summaryPanel"></div>
  </div>
  <div class="toast" id="toast"></div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAosCltdJIP2Y4fypK42QKVhcTeUbUyXXc",
  authDomain: "sakitodo.firebaseapp.com",
  projectId: "sakitodo",
  storageBucket: "sakitodo.firebasestorage.app",
  messagingSenderId: "137427086725",
  appId: "1:137427086725:web:c2771ec90cacf5144828ec",
  measurementId: "G-VM91DKQL1H"
};

const isConfigured = FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";
let db = null, currentUser = null;

if (isConfigured) {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
  firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
  firebase.auth().onAuthStateChanged(user => {
    if (user) { currentUser = user; showApp(user); loadFromCloud(); }
    else { currentUser = null; showLogin(); }
  });
} else { showApp(null); }

const CATS = {
  work:  { icon: '💼', label: '工作待办', color: '#3b82f6', isTodo: true },
  life:  { icon: '🏠', label: '生活待办', color: '#10b981', isTodo: true },
  idea:  { icon: '💡', label: '想法',     color: '#f59e0b' },
  learn: { icon: '📚', label: '学习',     color: '#6366f1' },
  ai:    { icon: '🤖', label: 'AI可尝试', color: '#8b5cf6' }
};
const PRI_LABELS = { h: '🔴 高', m: '🟡 中', l: '🟢 低' };

let entries = JSON.parse(localStorage.getItem('braindump_v3') || '[]');
let currentCat = 'work', currentPri = 'm', currentFilter = 'all';
let loginMode = true;

// Theme
function initTheme() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}
initTheme();

// Auth
function showLogin() { document.getElementById('loginScreen').classList.remove('hidden'); document.getElementById('mainApp').style.display = 'none'; }
function showApp(user) {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').style.display = '';
  if (user) {
    document.getElementById('userName').textContent = user.displayName || user.email || '用户';
    if (user.photoURL) { document.getElementById('userAvatar').src = user.photoURL; document.getElementById('userAvatar').style.display = ''; document.getElementById('userBtn').style.display = 'none'; }
    else { document.getElementById('userAvatar').style.display = 'none'; document.getElementById('userBtn').style.display = ''; }
  } else {
    document.getElementById('userName').textContent = '本地模式';
    document.getElementById('userAvatar').style.display = 'none';
    document.getElementById('userBtn').style.display = '';
  }
  render();
}
function toggleLoginMode() { loginMode = !loginMode; document.getElementById('loginSubmit').textContent = loginMode ? '登录' : '注册'; document.getElementById('loginModeSwitch').textContent = loginMode ? '没有账号？点击注册' : '已有账号？点击登录'; document.getElementById('loginError').textContent = ''; }
async function loginGoogle() {
  if (!isConfigured) { toast('Firebase 未配置'); return; }
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await firebase.auth().signInWithRedirect(provider);
  } catch (e) { document.getElementById('loginError').textContent = translateError(e.code); }
}

// Handle redirect result on page load
if (isConfigured) {
  firebase.auth().getRedirectResult().catch(e => {
    if (e.code) document.getElementById('loginError').textContent = translateError(e.code);
  });
}
async function loginEmail() {
  if (!isConfigured) { toast('Firebase 未配置'); return; }
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!email || !pass) { document.getElementById('loginError').textContent = '请填写邮箱和密码'; return; }
  try {
    document.getElementById('loginError').textContent = '';
    if (loginMode) await firebase.auth().signInWithEmailAndPassword(email, pass);
    else await firebase.auth().createUserWithEmailAndPassword(email, pass);
  } catch (e) { document.getElementById('loginError').textContent = translateError(e.code); }
}
function translateError(code) {
  return { 'auth/email-already-in-use': '该邮箱已被注册', 'auth/invalid-email': '邮箱格式不正确', 'auth/weak-password': '密码至少6位', 'auth/user-not-found': '用户不存在', 'auth/wrong-password': '密码错误', 'auth/invalid-credential': '登录信息无效', 'auth/too-many-requests': '请求频繁，请稍后再试' }[code] || '失败：' + code;
}
async function logout() { toggleUserMenu(); if (isConfigured && currentUser) await firebase.auth().signOut(); }
function toggleUserMenu() { document.getElementById('userDropdown').classList.toggle('open'); }
document.addEventListener('click', e => { if (!e.target.closest('.user-menu')) document.getElementById('userDropdown').classList.remove('open'); });

// Cloud
async function loadFromCloud() {
  if (!db || !currentUser) return;
  setSyncStatus('syncing', '同步中');
  try {
    const snap = await db.collection('users').doc(currentUser.uid).collection('entries').orderBy('ts', 'desc').get();
    const cloud = snap.docs.map(d => ({ id: d.data().id || parseInt(d.id), ...d.data() }));
    if (cloud.length > 0) {
      const ids = new Set(cloud.map(e => e.id));
      entries = [...cloud, ...entries.filter(e => !ids.has(e.id))].sort((a, b) => b.ts - a.ts);
      saveLocal(); render();
    }
    setSyncStatus('synced', '已同步');
  } catch (e) { console.error(e); setSyncStatus('offline', '离线'); }
}
async function syncToCloud(entry, action = 'set') {
  if (!db || !currentUser) return;
  setSyncStatus('syncing', '同步中');
  try {
    const ref = db.collection('users').doc(currentUser.uid).collection('entries').doc(String(entry.id));
    if (action === 'set') await ref.set(entry); else await ref.delete();
    setSyncStatus('synced', '已同步');
  } catch (e) { setSyncStatus('offline', '失败'); }
}
async function bulkSync() {
  if (!db || !currentUser) return;
  setSyncStatus('syncing', '上传中');
  try { const batch = db.batch(); entries.forEach(e => { batch.set(db.collection('users').doc(currentUser.uid).collection('entries').doc(String(e.id)), e); }); await batch.commit(); setSyncStatus('synced', '已同步'); toast('同步完成'); } catch { setSyncStatus('offline', '失败'); toast('同步失败'); }
}
function setSyncStatus(s, t) { document.getElementById('syncStatus').innerHTML = `<span class="sync-dot ${s}"></span>${t}`; }

// Date
function fmtDate(d) { const w = ['日','一','二','三','四','五','六']; return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${w[d.getDay()]}`; }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }
function fmtDateShort(ts) { const d = new Date(ts), n = new Date(); if (d.toDateString() === n.toDateString()) return '今天'; const y = new Date(n); y.setDate(y.getDate()-1); if (d.toDateString() === y.toDateString()) return '昨天'; return `${d.getMonth()+1}/${d.getDate()}`; }
document.getElementById('headerDate').textContent = fmtDate(new Date());

// Cat & Priority
function setCat(cat) { currentCat = cat; document.querySelectorAll('.opt-pill').forEach(p => p.classList.toggle('active', p.dataset.cat === cat)); }
function setPri(p) { currentPri = p; document.querySelectorAll('.pri-btn').forEach(b => b.classList.toggle('active', b.classList.contains(p))); }
document.querySelectorAll('.filter-tab').forEach(tab => tab.addEventListener('click', () => { document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); currentFilter = tab.dataset.filter; render(); }));

// Input
const dumpInput = document.getElementById('dumpInput');
dumpInput.addEventListener('keydown', e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addEntry(); });
dumpInput.addEventListener('input', () => { dumpInput.style.height = 'auto'; dumpInput.style.height = Math.min(dumpInput.scrollHeight, 200) + 'px'; });

function addEntry() {
  const text = dumpInput.value.trim();
  if (!text) return;
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const now = Date.now();
  lines.forEach((line, i) => { const entry = { id: now+i, text: line, cat: currentCat, pri: currentPri, done: false, ts: now+i }; entries.unshift(entry); syncToCloud(entry); });
  dumpInput.value = ''; dumpInput.style.height = 'auto';
  saveLocal(); render();
}

function toggleDone(id) { const e = entries.find(e => e.id === id); if (e) { e.done = !e.done; syncToCloud(e); } saveLocal(); render(); }
function deleteEntry(id) { entries = entries.filter(e => e.id !== id); syncToCloud({id}, 'delete'); saveLocal(); render(); }

function changeCat(id, newCat) {
  const e = entries.find(e => e.id === id);
  if (e) { e.cat = newCat; syncToCloud(e); }
  saveLocal(); render();
  document.querySelectorAll('.cat-picker').forEach(p => p.remove());
}

function showCatPicker(id) {
  document.querySelectorAll('.cat-picker').forEach(p => p.remove());
  const card = document.querySelector(`[data-entry-id="${id}"]`);
  const picker = document.createElement('div');
  picker.className = 'cat-picker open';
  picker.innerHTML = Object.entries(CATS).map(([k, v]) =>
    `<button class="cat-picker-item" onclick="changeCat(${id},'${k}')">${v.icon} ${v.label}</button>`
  ).join('');
  card.appendChild(picker);
  setTimeout(() => document.addEventListener('click', function handler(e) { if (!e.target.closest('.cat-picker')) { picker.remove(); document.removeEventListener('click', handler); } }), 10);
}

function editEntry(id) {
  const card = document.querySelector(`[data-entry-id="${id}"]`);
  const e = entries.find(e => e.id === id);
  if (!e) return;
  card.querySelector('.card-text').innerHTML = `<textarea class="edit-textarea" rows="2">${esc(e.text)}</textarea><div class="edit-btns"><button class="edit-btn edit-save" onclick="saveEdit(${id})">保存</button><button class="edit-btn edit-cancel" onclick="render()">取消</button></div>`;
  card.querySelector('textarea').focus();
}
function saveEdit(id) { const card = document.querySelector(`[data-entry-id="${id}"]`); const e = entries.find(e => e.id === id); const val = card.querySelector('textarea').value.trim(); if (val && e) { e.text = val; syncToCloud(e); } saveLocal(); render(); }
function saveLocal() { localStorage.setItem('braindump_v3', JSON.stringify(entries)); }

// Render
function render() {
  const counts = {}; Object.keys(CATS).forEach(k => counts[k] = 0);
  entries.forEach(e => { if (counts[e.cat] !== undefined) counts[e.cat]++; });
  document.getElementById('statsBar').innerHTML = Object.entries(CATS).map(([k, v]) =>
    `<div class="stat-chip${currentFilter===k?' active':''}" onclick="setFilter('${k}')"><span class="stat-dot" style="background:${v.color}"></span>${v.label} ${counts[k]}</div>`
  ).join('');

  const filtered = currentFilter === 'all' ? entries : entries.filter(e => e.cat === currentFilter);
  const list = document.getElementById('cardList');
  if (!filtered.length) { list.innerHTML = `<div class="empty"><div class="empty-icon">🧠</div>${currentFilter==='all'?'把脑子里的东西倒出来吧':`还没有「${CATS[currentFilter]?.label}」`}</div>`; return; }
  let html = '', lastDate = '';
  filtered.forEach(e => {
    const ds = fmtDateShort(e.ts);
    if (ds !== lastDate) { lastDate = ds; html += `<div class="date-sep">${ds}</div>`; }
    const cat = CATS[e.cat] || CATS.idea;
    const isTodo = cat.isTodo;
    html += `<div class="card" data-cat="${e.cat}" data-entry-id="${e.id}" ondblclick="editEntry(${e.id})">
      <div class="card-top">
        ${isTodo ? `<div class="todo-check${e.done?' checked':''}" onclick="toggleDone(${e.id})"></div>` : ''}
        <div style="flex:1;min-width:0;">
          <div class="card-text${e.done?' done':''}">${esc(e.text)}</div>
          <div class="card-footer">
            <div class="card-left">
              <span class="card-tag ${e.cat}" onclick="showCatPicker(${e.id})">${cat.icon} ${cat.label}</span>
              <span class="pri-badge ${e.pri||'m'}">${PRI_LABELS[e.pri||'m']}</span>
              <span class="card-time">${fmtTime(e.ts)}</span>
            </div>
            <div class="card-actions">
              <button class="card-action-btn" onclick="editEntry(${e.id})">✏️</button>
              <button class="card-action-btn del" onclick="deleteEntry(${e.id})">×</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  });
  list.innerHTML = html;
}
function setFilter(f) { currentFilter = f; document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.filter === f)); render(); }

// Summary
function showSummary() {
  const today = new Date().toDateString();
  const todayE = entries.filter(e => new Date(e.ts).toDateString() === today);
  const panel = document.getElementById('summaryPanel');
  const counts = {}; Object.keys(CATS).forEach(k => counts[k] = []);
  todayE.forEach(e => { if (counts[e.cat]) counts[e.cat].push(e); });

  const highPri = todayE.filter(e => e.pri === 'h' && !e.done);
  const doneCount = todayE.filter(e => e.done).length;
  const total = todayE.length;

  let html = `<div class="summary-handle"></div>
    <div class="summary-title">📊 今日复盘</div>
    <div class="summary-sub">${fmtDate(new Date())} · 记录 ${total} 条${doneCount ? ` · 完成 ${doneCount} 件` : ''}</div>`;

  // Deep insight
  const insights = [];
  if (highPri.length > 0) insights.push(`🔴 还有 ${highPri.length} 件高优先级事项未完成，明天优先处理它们`);
  if (counts.work.length > 3 && doneCount < counts.work.length) insights.push('💼 工作任务较多但完成率偏低，试着聚焦最重要的 1-2 件');
  if (counts.life.length > 0 && counts.work.length === 0) insights.push('🏠 今天只记录了生活相关，工作的事也别忘了梳理');
  if (counts.learn.length > 0) insights.push('📚 今天有学习记录，持续积累是最好的投资');
  if (counts.idea.length >= 3) insights.push('💡 灵感迸发的一天，挑一个最有感觉的落地试试');
  if (counts.ai.length > 0) insights.push('🤖 有值得用 AI 探索的问题，明天挑一个动手试试');
  if (total === 0) insights.push('📝 今天没有记录，大脑清空了也是好事');
  if (total > 10) insights.push('🧠 今天记录很多，说明你在积极思考');

  if (insights.length) {
    html += `<div class="insight-box"><h4>🌟 今日洞察</h4>${insights.map(i => `<div class="insight-line">${i}</div>`).join('')}</div>`;
  }

  // Tomorrow guidance
  const tomorrowActions = [];
  highPri.forEach(e => tomorrowActions.push({ text: e.text, source: '今日高优未完成' }));
  counts.work.filter(e => !e.done && e.pri === 'm').slice(0, 2).forEach(e => tomorrowActions.push({ text: e.text, source: '工作中优先级' }));
  counts.learn.forEach(e => tomorrowActions.push({ text: `继续深入：${e.text}`, source: '学习延续' }));
  counts.ai.forEach(e => tomorrowActions.push({ text: `动手试试：${e.text}`, source: 'AI 探索' }));
  counts.idea.slice(0, 2).forEach(e => tomorrowActions.push({ text: `评估可行性：${e.text}`, source: '想法筛选' }));

  if (tomorrowActions.length) {
    html += `<div class="summary-section"><h3>🌅 明日指引 <span class="summary-count">${tomorrowActions.length}</span></h3>
      ${tomorrowActions.map(a => `<div class="action-item"><div class="action-label">${a.source}</div>${esc(a.text)}</div>`).join('')}</div>`;
  }

  // Category breakdown (compact)
  const hasAny = Object.values(counts).some(c => c.length > 0);
  if (hasAny) {
    html += `<div class="summary-section"><h3>📋 分类明细</h3>`;
    Object.entries(CATS).forEach(([k, v]) => {
      if (!counts[k].length) return;
      html += `<div style="margin-bottom:8px"><div style="font-size:12px;color:var(--text2);margin-bottom:4px;">${v.icon} ${v.label} (${counts[k].length})</div>`;
      counts[k].forEach(e => { html += `<div class="summary-item${e.done?'" style="opacity:0.5;text-decoration:line-through':''}">${esc(e.text)} <span class="pri-badge ${e.pri||'m'}" style="font-size:9px">${PRI_LABELS[e.pri||'m']}</span></div>`; });
      html += '</div>';
    });
    html += '</div>';
  }

  // Life wisdom
  html += `<div class="insight-box" style="margin-top:8px;">
    <h4>💫 一句话</h4>
    <div style="font-size:14px;line-height:1.8;color:var(--text2);">
    ${getWisdom(todayE)}
    </div>
  </div>`;

  if (isConfigured && currentUser) html += `<button class="close-summary" style="background:var(--accent);margin-top:8px" onclick="bulkSync()">☁️ 同步到云端</button>`;
  html += `<button class="close-summary" onclick="closeSummary()">关闭</button>`;
  panel.innerHTML = html;
  document.getElementById('summaryOverlay').classList.add('open');
}

function getWisdom(entries) {
  const hasWork = entries.some(e => e.cat === 'work');
  const hasLife = entries.some(e => e.cat === 'life');
  const hasLearn = entries.some(e => e.cat === 'learn');
  const done = entries.filter(e => e.done).length;
  const total = entries.length;

  if (total === 0) return '空白的一天也是新的开始，明天从写下一条待办开始。';
  if (done === total && total > 0) return '全部完成！执行力就是你的超能力。好好休息，明天继续。';
  if (done === 0 && total > 3) return '想得多做得少很正常，明天只挑一件最重要的，先动起来。';
  if (hasLearn) return '学习是对自己最好的投资，今天种下的种子，未来会开花。';
  if (hasWork && hasLife) return '工作和生活都在转，保持平衡不容易，但你已经在做了。';
  return '每一天的记录，都是你成长的证据。坚持下去。';
}

function closeSummary() { document.getElementById('summaryOverlay').classList.remove('open'); }

// Export
function exportData() {
  const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `braindump_${new Date().toISOString().slice(0,10)}.json`; a.click();
}

function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

render();
</script>
</body>
</html>
