<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>大脑转储</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --transition: 0.25s ease; }
    [data-theme="dark"] {
      --bg: #0f172a; --surface: #1e293b; --surface2: #253349;
      --border: #334155; --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
      --input-bg: #1e293b; --hover: rgba(255,255,255,0.04); --accent: #6366f1;
    }
    [data-theme="light"] {
      --bg: #f1f5f9; --surface: #ffffff; --surface2: #f8fafc;
      --border: #e2e8f0; --text: #1e293b; --text2: #475569; --text3: #94a3b8;
      --input-bg: #f8fafc; --hover: rgba(0,0,0,0.03); --accent: #4f46e5;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh; transition: background var(--transition), color var(--transition); }
    .app { max-width: 600px; margin: 0 auto; padding: 0 16px 100px; }

    /* Login */
    .login-screen { position: fixed; inset: 0; z-index: 1000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; }
    .login-screen.hidden { display: none; }
    .login-logo { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
    .login-sub { font-size: 14px; color: var(--text3); margin-bottom: 32px; text-align: center; line-height: 1.6; }
    .login-btn { display: flex; align-items: center; gap: 10px; background: #fff; color: #333; border: none; border-radius: 12px; padding: 14px 28px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-bottom: 12px; width: 280px; justify-content: center; }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .login-btn.email-login { background: var(--accent); color: #fff; }
    .login-divider { font-size: 12px; color: var(--text3); margin: 16px 0; display: flex; align-items: center; gap: 12px; width: 280px; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .login-email-form { width: 280px; }
    .login-input { width: 100%; padding: 12px 16px; background: var(--surface); border: 2px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 10px; }
    .login-input:focus { border-color: var(--accent); }
    .login-input::placeholder { color: var(--text3); }
    .login-error { color: #ef4444; font-size: 12px; margin-bottom: 8px; min-height: 16px; }
    .login-mode-switch { background: none; border: none; color: var(--accent); font-size: 13px; cursor: pointer; margin-top: 8px; }
    .remember-row { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
    .remember-row input { accent-color: var(--accent); }
    .remember-row label { font-size: 12px; color: var(--text2); cursor: pointer; }

    /* Header */
    .header { padding: 20px 0 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; transition: background var(--transition); }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header-date { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn { width: 36px; height: 36px; border-radius: 10px; border: 1.5px solid var(--border); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-weight: 600; }
    .icon-btn:hover { border-color: var(--accent); color: var(--text); }
    .icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; object-fit: cover; }
    .user-menu { position: relative; }
    .user-dropdown { position: absolute; right: 0; top: 44px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 8px; min-width: 160px; display: none; z-index: 20; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
    .user-dropdown.open { display: block; }
    .user-dropdown-item { display: block; width: 100%; padding: 10px 12px; border: none; background: none; color: var(--text2); font-size: 13px; text-align: left; cursor: pointer; border-radius: 8px; transition: background 0.15s; }
    .user-dropdown-item:hover { background: var(--hover); color: var(--text); }
    .user-dropdown-name { padding: 8px 12px; font-size: 13px; color: var(--text); font-weight: 600; border-bottom: 1px solid var(--border); margin-bottom: 4px; }

    /* Sync */
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .sync-dot.synced { background: #10b981; }
    .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
    .sync-dot.offline { background: #ef4444; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Stats */
    .stats { display: flex; gap: 8px; padding: 12px 0; overflow-x: auto; scrollbar-width: none; }
    .stats::-webkit-scrollbar { display: none; }
    .stat-chip { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; color: var(--text2); white-space: nowrap; cursor: pointer; transition: all 0.2s; }
    .stat-chip:hover, .stat-chip.active { border-color: var(--text2); color: var(--text); }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Sort bar */
    .sort-bar { display: flex; align-items: center; gap: 8px; padding: 0 0 8px; font-size: 12px; color: var(--text3); }
    .sort-btn { background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 11px; cursor: pointer; color: var(--text3); transition: all 0.2s; font-weight: 500; }
    .sort-btn.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }

    /* Input */
    .input-box { background: var(--surface); border: 2px solid var(--border); border-radius: 16px; margin: 8px 0 16px; transition: border-color 0.2s, background var(--transition); }
    .input-box:focus-within { border-color: var(--accent); }
    .input-box textarea { width: 100%; background: transparent; border: none; padding: 14px 16px 8px; font-size: 15px; color: var(--text); outline: none; font-family: inherit; resize: none; min-height: 56px; line-height: 1.5; }
    .input-box textarea::placeholder { color: var(--text3); }
    .input-row { display: flex; align-items: center; padding: 6px 10px 10px; gap: 8px; }
    .input-row.options { padding-bottom: 4px; }
    .input-row.send-row { padding-top: 0; justify-content: flex-end; }
    .input-options { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; align-items: center; flex: 1; }
    .input-options::-webkit-scrollbar { display: none; }
    .opt-pill { border: 1.5px solid var(--border); background: transparent; border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: var(--text3); white-space: nowrap; transition: all 0.2s; }
    .opt-pill.active { font-weight: 600; }
    .opt-pill[data-cat="work"].active { border-color: #3b82f6; background: rgba(59,130,246,0.12); color: #3b82f6; }
    .opt-pill[data-cat="life"].active { border-color: #10b981; background: rgba(16,185,129,0.12); color: #10b981; }
    .opt-pill[data-cat="idea"].active { border-color: #f59e0b; background: rgba(245,158,11,0.12); color: #f59e0b; }
    .opt-pill[data-cat="learn"].active { border-color: #6366f1; background: rgba(99,102,241,0.12); color: #6366f1; }
    .opt-pill[data-cat="ai"].active { border-color: #8b5cf6; background: rgba(139,92,246,0.12); color: #8b5cf6; }
    .pri-group { display: flex; gap: 4px; }
    .pri-btn { border: 1.5px solid var(--border); background: transparent; border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text3); }
    .pri-btn.active.h { border-color: #ef4444; background: rgba(239,68,68,0.15); color: #ef4444; }
    .pri-btn.active.m { border-color: #f59e0b; background: rgba(245,158,11,0.15); color: #f59e0b; }
    .pri-btn.active.l { border-color: #10b981; background: rgba(16,185,129,0.15); color: #10b981; }
    .send-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }

    /* Filter */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 8px; overflow-x: auto; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-tab { background: transparent; border: none; padding: 6px 12px; font-size: 12px; color: var(--text3); cursor: pointer; border-radius: 8px; white-space: nowrap; transition: all 0.2s; }
    .filter-tab:hover { color: var(--text2); background: var(--hover); }
    .filter-tab.active { color: var(--text); background: var(--surface); }

    /* Cards */
    .card-list { display: flex; flex-direction: column; gap: 8px; }
    .card { background: var(--surface); border-radius: 14px; padding: 14px 16px; border-left: 4px solid var(--border); animation: fadeUp 0.2s ease; position: relative; transition: background var(--transition); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } }
    .card[data-cat="work"] { border-left-color: #3b82f6; }
    .card[data-cat="life"] { border-left-color: #10b981; }
    .card[data-cat="idea"] { border-left-color: #f59e0b; }
    .card[data-cat="learn"] { border-left-color: #6366f1; }
    .card[data-cat="ai"] { border-left-color: #8b5cf6; }
    .card.archived { opacity: 0.6; border-left-color: var(--text3); }
    .restore-btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .card-top { display: flex; align-items: flex-start; gap: 10px; }
    .card-text { font-size: 14px; line-height: 1.6; color: var(--text); word-break: break-word; white-space: pre-wrap; flex: 1; min-width: 0; }
    .card-text.done { text-decoration: line-through; color: var(--text3); }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .card-left { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .card-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; cursor: pointer; transition: opacity 0.15s; }
    .card-tag:hover { opacity: 0.8; }
    .card-tag.work { background: rgba(59,130,246,0.12); color: #3b82f6; }
    .card-tag.life { background: rgba(16,185,129,0.12); color: #10b981; }
    .card-tag.idea { background: rgba(245,158,11,0.12); color: #f59e0b; }
    .card-tag.learn { background: rgba(99,102,241,0.12); color: #6366f1; }
    .card-tag.ai { background: rgba(139,92,246,0.12); color: #8b5cf6; }
    .pri-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px; }
    .pri-badge.h { background: #ef4444; color: #fff; }
    .pri-badge.m { background: rgba(245,158,11,0.18); color: #f59e0b; }
    .pri-badge.l { background: rgba(16,185,129,0.15); color: #10b981; }
    .card-time { font-size: 11px; color: var(--text3); }
    .card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .card:hover .card-actions { opacity: 1; }
    .card-action-btn { width: 28px; height: 28px; border-radius: 8px; border: none; background: transparent; color: var(--text3); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .card-action-btn:hover { background: var(--hover); color: var(--text); }
    .card-action-btn.del:hover { color: #ef4444; background: rgba(239,68,68,0.08); }
    .todo-check { width: 20px; height: 20px; border: 2px solid var(--text3); border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-top: 2px; }
    .todo-check:hover { border-color: var(--accent); }
    .todo-check.checked { background: var(--accent); border-color: transparent; }
    .todo-check.checked::after { content: "\2713"; color: #fff; font-size: 12px; font-weight: 700; }

    /* Category picker */
    .cat-picker { position: absolute; top: 40px; left: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 6px; z-index: 30; box-shadow: 0 8px 20px rgba(0,0,0,0.2); display: none; }
    .cat-picker.open { display: block; }
    .cat-picker-item { display: block; width: 100%; padding: 8px 14px; border: none; background: none; color: var(--text2); font-size: 12px; text-align: left; cursor: pointer; border-radius: 6px; white-space: nowrap; transition: background 0.15s; }
    .cat-picker-item:hover { background: var(--hover); color: var(--text); }

    /* Empty */
    .empty { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 14px; }

    /* Date separator */
    .date-sep { font-size: 12px; color: var(--text3); font-weight: 600; padding: 16px 0 8px; display: flex; align-items: center; gap: 8px; }
    .date-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Overlay / Panel */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; justify-content: center; align-items: flex-end; }
    .overlay.open { display: flex; }
    .panel { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; padding: 24px 20px 40px; animation: slideUp 0.3s ease; transition: background var(--transition); }
    @keyframes slideUp { from { transform: translateY(100%); } }
    .panel-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .panel-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .panel-sub { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
    .panel-section { margin-bottom: 16px; }
    .panel-section h3 { font-size: 13px; color: var(--text2); font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .panel-item { font-size: 13px; color: var(--text); padding: 8px 12px; background: var(--hover); border-radius: 8px; margin-bottom: 4px; line-height: 1.5; }
    .count-badge { font-size: 11px; background: var(--border); border-radius: 10px; padding: 1px 8px; color: var(--text2); }
    .insight-box { background: var(--surface2); border-radius: 14px; padding: 16px; margin-top: 12px; border: 1px solid var(--border); line-height: 1.8; font-size: 13px; color: var(--text); }
    .insight-box h4 { font-size: 14px; margin-bottom: 8px; }
    .insight-line { padding: 4px 0; border-bottom: 1px solid var(--border); }
    .insight-line:last-child { border: none; }
    .action-item { font-size: 13px; color: var(--text); padding: 10px 12px; background: var(--hover); border-radius: 10px; margin-bottom: 6px; border-left: 3px solid var(--accent); line-height: 1.5; }
    .action-label { font-size: 10px; color: var(--accent); font-weight: 600; margin-bottom: 2px; }
    .close-btn { display: block; width: 100%; padding: 14px; background: var(--border); border: none; border-radius: 12px; color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; }
    .close-btn:hover { opacity: 0.8; }
    .close-btn.accent { background: var(--accent); }

    /* Time range tabs */
    .time-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .time-tab { background: transparent; border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 12px; cursor: pointer; color: var(--text3); transition: all 0.2s; font-weight: 500; }
    .time-tab.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .custom-range { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    .custom-range input { padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--input-bg); color: var(--text); font-size: 12px; outline: none; }
    .custom-range input:focus { border-color: var(--accent); }

    /* Edit */
    .edit-textarea { width: 100%; background: transparent; border: 2px solid var(--accent); border-radius: 10px; padding: 10px 12px; font-size: 14px; color: var(--text); outline: none; font-family: inherit; resize: none; min-height: 60px; line-height: 1.5; }
    .edit-opts { display: flex; gap: 6px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
    .edit-opts .opt-pill { font-size: 11px; padding: 3px 10px; }
    .edit-opts .pri-btn { font-size: 10px; padding: 3px 8px; }
    .edit-btns { display: flex; gap: 8px; margin-top: 8px; }
    .edit-btn { padding: 6px 16px; border-radius: 8px; border: none; font-size: 12px; cursor: pointer; font-weight: 600; }
    .edit-save { background: var(--accent); color: #fff; }
    .edit-cancel { background: var(--border); color: var(--text2); }

    /* Export panel */
    .export-form { margin-bottom: 12px; }
    .export-form label { font-size: 12px; color: var(--text2); font-weight: 600; display: block; margin-bottom: 6px; }
    .export-opts { display: flex; gap: 6px; flex-wrap: wrap; }
    .export-opt { background: transparent; border: 1.5px solid var(--border); border-radius: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: var(--text3); transition: all 0.2s; }
    .export-opt.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .export-checks { display: flex; flex-wrap: wrap; gap: 8px; }
    .export-check { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text2); cursor: pointer; }
    .export-check input { accent-color: var(--accent); }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; font-size: 13px; color: var(--text); z-index: 200; opacity: 0; transition: opacity 0.3s; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .toast.show { opacity: 1; }

    @media (hover: none) { .card-actions { opacity: 1; } }
    @media (max-width: 420px) { .opt-pill { padding: 4px 10px; font-size: 11px; } }
  </style>
</head>
<body>
  <!-- Login -->
  <div class="login-screen" id="loginScreen">
    <div class="login-logo">Brain Dump</div>
    <div class="login-sub">把脑子里的东西全倒出来<br>登录后可跨设备同步数据</div>
    <button class="login-btn" onclick="loginGoogle()" style="background:#fff;color:#333;">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google 登录
    </button>
    <div class="login-divider">或</div>
    <div class="login-email-form">
      <div class="login-error" id="loginError"></div>
      <input class="login-input" type="email" id="loginEmail" placeholder="邮箱地址">
      <input class="login-input" type="password" id="loginPassword" placeholder="密码（至少6位）">
      <div class="remember-row"><input type="checkbox" id="rememberMe" checked><label for="rememberMe">记住我</label></div>
      <button class="login-btn email-login" onclick="loginEmail()">登录</button>
      <button class="login-mode-switch" id="loginModeSwitch" onclick="toggleLoginMode()">没有账号？点击注册</button>
    </div>
  </div>

  <!-- App -->
  <div class="app" id="mainApp" style="display:none;">
    <div class="header">
      <div class="header-top">
        <div>
          <h1>Brain Dump</h1>
          <div class="header-date" id="headerDate"></div>
        </div>
        <div class="header-actions">
          <span id="syncStatus" style="font-size:11px;color:var(--text3);display:flex;align-items:center;"><span class="sync-dot synced"></span>已同步</span>
          <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
          <button class="icon-btn" onclick="showSummary()" title="复盘"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></button>
          <button class="icon-btn" onclick="showExport()" title="导出"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
          <div class="user-menu">

            <button class="icon-btn" id="userBtn" onclick="toggleUserMenu()" style="display:none;"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>

              <div class="user-dropdown-name" id="userName"></div>
              <button class="user-dropdown-item" onclick="showSummary();toggleUserMenu()">复盘分析</button>
              <button class="user-dropdown-item" onclick="showExport();toggleUserMenu()">导出数据</button>

      <div class="input-row options">

          <button class="opt-pill active" data-cat="work" onclick="setCat('work')">工作</button>
          <button class="opt-pill" data-cat="life" onclick="setCat('life')">生活</button>
          <button class="opt-pill" data-cat="idea" onclick="setCat('idea')">想法</button>
          <button class="opt-pill" data-cat="learn" onclick="setCat('learn')">学习</button>
          <button class="opt-pill" data-cat="ai" onclick="setCat('ai')">AI试试</button>

      <div class="input-row send-row">
        <div class="pri-group">
          <button class="pri-btn h" onclick="setPri('h')">高</button>
          <button class="pri-btn m active" onclick="setPri('m')">中</button>
          <button class="pri-btn l" onclick="setPri('l')">低</button>

        <button class="send-btn" onclick="addEntry()">&#8593;</button>

      <button class="filter-tab active" data-filter="all">全部</button>
      <button class="filter-tab" data-filter="work">工作</button>
      <button class="filter-tab" data-filter="life">生活</button>
      <button class="filter-tab" data-filter="idea">想法</button>
      <button class="filter-tab" data-filter="learn">学习</button>
      <button class="filter-tab" data-filter="ai">AI试试</button>
      <button class="filter-tab" data-filter="archive">归档</button>

      <span>排序：</span>
      <button class="sort-btn active" data-sort="time" onclick="setSort('time')">时间</button>
      <button class="sort-btn" data-sort="pri" onclick="setSort('pri')">优先级</button>

  <div class="overlay" id="summaryOverlay" onclick="if(event.target===this)closePanel('summaryOverlay')">
    <div class="panel" id="summaryPanel"></div>
  </div>
  <div class="overlay" id="exportOverlay" onclick="if(event.target===this)closePanel('exportOverlay')">
    <div class="panel" id="exportPanel"></div>
  </div>
  <div class="toast" id="toast"></div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAosCltdJIP2Y4fypK42QKVhcTeUbUyXXc",
  authDomain: "sakitodo.firebaseapp.com", projectId: "sakitodo",
  storageBucket: "sakitodo.firebasestorage.app", messagingSenderId: "137427086725",
  appId: "1:137427086725:web:c2771ec90cacf5144828ec", measurementId: "G-VM91DKQL1H"
};
const isConfigured = FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";
let db = null, currentUser = null;
if (isConfigured) {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
  firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
  firebase.auth().onAuthStateChanged(user => {
    if (user) { currentUser = user; showApp(user); loadFromCloud(); }
    else { currentUser = null; showLogin(); }
  });
} else { showApp(null); }

const CATS = {
  work:  { label: '工作待办', color: '#3b82f6', isTodo: true },
  life:  { label: '生活待办', color: '#10b981', isTodo: true },
  idea:  { label: '想法',     color: '#f59e0b' },
  learn: { label: '学习',     color: '#6366f1' },
  ai:    { label: 'AI可尝试', color: '#8b5cf6' }
};
const CAT_SHORT = { work: '工作', life: '生活', idea: '想法', learn: '学习', ai: 'AI试试' };
const PRI_LABELS = { h: '高', m: '中', l: '低' };
const PRI_ORDER = { h: 0, m: 1, l: 2 };

let entries = JSON.parse(localStorage.getItem('braindump_v3') || '[]');
let currentCat = 'work', currentPri = 'm', currentFilter = 'all', currentSort = 'time';
let loginMode = true;

// Theme
function initTheme() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeBtn').innerHTML = saved === 'dark'
    ? '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
    : '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  initTheme();
}
initTheme();

// Auth
function showLogin() { document.getElementById('loginScreen').classList.remove('hidden'); document.getElementById('mainApp').style.display = 'none'; }
function showApp(user) {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').style.display = '';
  if (user) {
    document.getElementById('userName').textContent = user.displayName || user.email || '用户';
    if (user.photoURL) { document.getElementById('userAvatar').src = user.photoURL; document.getElementById('userAvatar').style.display = ''; document.getElementById('userBtn').style.display = 'none'; }
    else { document.getElementById('userAvatar').style.display = 'none'; document.getElementById('userBtn').style.display = ''; }
  } else {
    document.getElementById('userName').textContent = '本地模式';
    document.getElementById('userAvatar').style.display = 'none';
    document.getElementById('userBtn').style.display = '';
  }
  render();
}
function toggleLoginMode() { loginMode = !loginMode; document.getElementById('loginModeSwitch').textContent = loginMode ? '没有账号？点击注册' : '已有账号？点击登录'; document.getElementById('loginError').textContent = ''; }
async function loginGoogle() {
  if (!isConfigured) { toast('Firebase 未配置'); return; }
  try { await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); } catch (e) { document.getElementById('loginError').textContent = translateError(e.code); }
}
async function loginEmail() {
  if (!isConfigured) { toast('Firebase 未配置'); return; }
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!email || !pass) { document.getElementById('loginError').textContent = '请填写邮箱和密码'; return; }
  try {
    document.getElementById('loginError').textContent = '';
    if (loginMode) await firebase.auth().signInWithEmailAndPassword(email, pass);
    else await firebase.auth().createUserWithEmailAndPassword(email, pass);
  } catch (e) { document.getElementById('loginError').textContent = translateError(e.code); }
}
function translateError(code) {
  return { 'auth/email-already-in-use': '该邮箱已被注册', 'auth/invalid-email': '邮箱格式不正确', 'auth/weak-password': '密码至少6位', 'auth/user-not-found': '用户不存在', 'auth/wrong-password': '密码错误', 'auth/invalid-credential': '登录信息无效', 'auth/too-many-requests': '请求频繁，请稍后再试' }[code] || '失败：' + code;
}
async function logout() { toggleUserMenu(); if (isConfigured && currentUser) await firebase.auth().signOut(); }
function toggleUserMenu() { document.getElementById('userDropdown').classList.toggle('open'); }
document.addEventListener('click', e => { if (!e.target.closest('.user-menu')) document.getElementById('userDropdown').classList.remove('open'); });

// Cloud
async function loadFromCloud() {
  if (!db || !currentUser) return;
  setSyncStatus('syncing', '同步中');
  try {
    const snap = await db.collection('users').doc(currentUser.uid).collection('entries').orderBy('ts', 'desc').get();
    const cloud = snap.docs.map(d => ({ id: d.data().id || parseInt(d.id), ...d.data() }));
    if (cloud.length > 0) {
      const ids = new Set(cloud.map(e => e.id));
      entries = [...cloud, ...entries.filter(e => !ids.has(e.id))].sort((a, b) => b.ts - a.ts);
      saveLocal(); render();
    }
    setSyncStatus('synced', '已同步');
  } catch (e) { console.error(e); setSyncStatus('offline', '离线'); }
}
async function syncToCloud(entry, action = 'set') {
  if (!db || !currentUser) return;
  setSyncStatus('syncing', '同步中');
  try {
    const ref = db.collection('users').doc(currentUser.uid).collection('entries').doc(String(entry.id));
    if (action === 'set') await ref.set(entry); else await ref.delete();
    setSyncStatus('synced', '已同步');
  } catch (e) { setSyncStatus('offline', '失败'); }
}
async function bulkSync() {
  if (!db || !currentUser) return;
  setSyncStatus('syncing', '上传中');
  try { const batch = db.batch(); entries.forEach(e => { batch.set(db.collection('users').doc(currentUser.uid).collection('entries').doc(String(e.id)), e); }); await batch.commit(); setSyncStatus('synced', '已同步'); toast('同步完成'); } catch { setSyncStatus('offline', '失败'); toast('同步失败'); }
}
function setSyncStatus(s, t) { document.getElementById('syncStatus').innerHTML = `<span class="sync-dot ${s}"></span>${t}`; }

// Date
function fmtDate(d) { const w = ['日','一','二','三','四','五','六']; return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${w[d.getDay()]}`; }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }
function fmtDateShort(ts) { const d = new Date(ts), n = new Date(); if (d.toDateString() === n.toDateString()) return '今天'; const y = new Date(n); y.setDate(y.getDate()-1); if (d.toDateString() === y.toDateString()) return '昨天'; return `${d.getMonth()+1}/${d.getDate()}`; }
document.getElementById('headerDate').textContent = fmtDate(new Date());

// Cat & Priority & Sort
function setCat(cat) { currentCat = cat; document.querySelectorAll('.opt-pill').forEach(p => p.classList.toggle('active', p.dataset.cat === cat)); }
function setPri(p) { currentPri = p; document.querySelectorAll('.pri-btn').forEach(b => b.classList.toggle('active', b.classList.contains(p))); }
function setSort(s) { currentSort = s; document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === s)); render(); }
document.querySelectorAll('.filter-tab').forEach(tab => tab.addEventListener('click', () => { document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); currentFilter = tab.dataset.filter; render(); }));

// Input
const dumpInput = document.getElementById('dumpInput');
dumpInput.addEventListener('keydown', e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addEntry(); });
dumpInput.addEventListener('input', () => { dumpInput.style.height = 'auto'; dumpInput.style.height = Math.min(dumpInput.scrollHeight, 200) + 'px'; });

function addEntry() {
  const text = dumpInput.value.trim();
  if (!text) return;
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const now = Date.now();
  lines.forEach((line, i) => { const entry = { id: now+i, text: line, cat: currentCat, pri: currentPri, done: false, ts: now+i }; entries.unshift(entry); syncToCloud(entry); });
  dumpInput.value = ''; dumpInput.style.height = 'auto';
  saveLocal(); render();
}

function toggleDone(id) { const e = entries.find(e => e.id === id); if (e) { e.done = !e.done; syncToCloud(e); } saveLocal(); render(); }
function deleteEntry(id) {
  const e = entries.find(e => e.id === id);
  if (e) { e.archived = true; e.archivedTs = Date.now(); syncToCloud(e); }
  saveLocal(); render();
}
function restoreEntry(id) {
  const e = entries.find(e => e.id === id);
  if (e) { delete e.archived; delete e.archivedTs; syncToCloud(e); }
  saveLocal(); render(); toast('已恢复');
}
function permanentDelete(id) {
  if (confirm('确定永久删除？此操作不可撤销')) { entries = entries.filter(e => e.id !== id); syncToCloud({id}, 'delete'); saveLocal(); render(); }
}

function changeCat(id, newCat) { const e = entries.find(e => e.id === id); if (e) { e.cat = newCat; syncToCloud(e); } saveLocal(); render(); document.querySelectorAll('.cat-picker').forEach(p => p.remove()); }
function changePri(id, newPri) { const e = entries.find(e => e.id === id); if (e) { e.pri = newPri; syncToCloud(e); } saveLocal(); render(); }

function showCatPicker(id) {
  document.querySelectorAll('.cat-picker').forEach(p => p.remove());
  const card = document.querySelector(`[data-entry-id="${id}"]`);
  const picker = document.createElement('div');
  picker.className = 'cat-picker open';
  picker.innerHTML = Object.entries(CATS).map(([k, v]) =>
    `<button class="cat-picker-item" onclick="changeCat(${id},'${k}')">${v.label}</button>`
  ).join('');
  card.appendChild(picker);
  setTimeout(() => document.addEventListener('click', function handler(e) { if (!e.target.closest('.cat-picker')) { picker.remove(); document.removeEventListener('click', handler); } }), 10);
}

function editEntry(id) {
  const card = document.querySelector(`[data-entry-id="${id}"]`);
  const e = entries.find(e => e.id === id);
  if (!e) return;
  const catBtns = Object.entries(CATS).map(([k, v]) =>
    `<button class="opt-pill${e.cat===k?' active':''}" data-cat="${k}" onclick="this.parentElement.querySelectorAll('.opt-pill').forEach(b=>b.classList.remove('active'));this.classList.add('active');this.dataset.editCat='${k}'">${CAT_SHORT[k]}</button>`
  ).join('');
  const priBtns = ['h','m','l'].map(p =>
    `<button class="pri-btn${e.pri===p?' active':''} ${p}" onclick="this.parentElement.querySelectorAll('.pri-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')" data-edit-pri="${p}">${PRI_LABELS[p]}</button>`
  ).join('');
  card.querySelector('.card-text').innerHTML = `
    <textarea class="edit-textarea" rows="2">${esc(e.text)}</textarea>
    <div class="edit-opts"><div class="input-options">${catBtns}</div><div class="pri-group">${priBtns}</div></div>
    <div class="edit-btns"><button class="edit-btn edit-save" onclick="saveEdit(${id})">保存</button><button class="edit-btn edit-cancel" onclick="render()">取消</button></div>`;
  card.querySelector('textarea').focus();
}
function saveEdit(id) {
  const card = document.querySelector(`[data-entry-id="${id}"]`);
  const e = entries.find(e => e.id === id);
  const val = card.querySelector('textarea').value.trim();
  const activeCat = card.querySelector('.edit-opts .opt-pill.active');
  const activePri = card.querySelector('.edit-opts .pri-btn.active');
  if (val && e) { e.text = val; }
  if (activeCat) e.cat = activeCat.dataset.cat;
  if (activePri) e.pri = activePri.dataset.editPri;
  syncToCloud(e); saveLocal(); render();
}
function saveLocal() { localStorage.setItem('braindump_v3', JSON.stringify(entries)); }

// Render
function render() {
  const counts = {}; Object.keys(CATS).forEach(k => counts[k] = 0);
  let archiveCount = 0;
  entries.forEach(e => { if (e.archived) archiveCount++; else if (counts[e.cat] !== undefined) counts[e.cat]++; });
  document.getElementById('statsBar').innerHTML = Object.entries(CATS).map(([k, v]) =>
    `<div class="stat-chip${currentFilter===k?' active':''}" onclick="setFilter('${k}')"><span class="stat-dot" style="background:${v.color}"></span>${v.label} ${counts[k]}</div>`
  ).join('') + `<div class="stat-chip${currentFilter==='archive'?' active':''}" onclick="setFilter('archive')" style="color:var(--text3)">归档 ${archiveCount}</div>`;

  const active = entries.filter(e => !e.archived);
  const archived = entries.filter(e => e.archived);
  let filtered;
  if (currentFilter === 'archive') filtered = [...archived].sort((a, b) => (b.archivedTs||b.ts) - (a.archivedTs||a.ts));
  else if (currentFilter === 'all') filtered = [...active];
  else filtered = active.filter(e => e.cat === currentFilter);
  if (currentSort === 'pri') filtered.sort((a, b) => (PRI_ORDER[a.pri]||1) - (PRI_ORDER[b.pri]||1) || b.ts - a.ts);
  else filtered.sort((a, b) => b.ts - a.ts);

  const list = document.getElementById('cardList');
  if (!filtered.length) { list.innerHTML = `<div class="empty">${currentFilter==='archive'?'归档是空的，删除的条目会出现在这里':currentFilter==='all'?'把脑子里的东西倒出来吧':`还没有「${CATS[currentFilter]?.label}」`}</div>`; return; }
  let html = '', lastDate = '';
  filtered.forEach(e => {
    const ds = fmtDateShort(e.ts);
    const isArchived = !!e.archived;
    if (currentSort === 'time' && !isArchived && ds !== lastDate) { lastDate = ds; html += `<div class="date-sep">${ds}</div>`; }
    const cat = CATS[e.cat] || CATS.idea;
    const isTodo = cat.isTodo;
    if (isArchived) {
      html += `<div class="card archived" data-entry-id="${e.id}">
        <div class="card-top"><div style="flex:1;min-width:0;">
          <div class="card-text" style="text-decoration:line-through">${esc(e.text)}</div>
          <div class="card-footer"><div class="card-left">
            <span class="card-tag ${e.cat}">${cat.label}</span>
            <span class="pri-badge ${e.pri||'m'}">${PRI_LABELS[e.pri||'m']}</span>
            <span class="card-time">${fmtTime(e.ts)}</span>
          </div><div class="card-actions">
            <button class="restore-btn" onclick="restoreEntry(${e.id})">恢复</button>
            <button class="card-action-btn del" onclick="permanentDelete(${e.id})" title="永久删除"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
          </div></div></div></div></div>`;
    } else {
      html += `<div class="card" data-cat="${e.cat}" data-entry-id="${e.id}" ondblclick="editEntry(${e.id})">
        <div class="card-top">
          ${isTodo ? `<div class="todo-check${e.done?' checked':''}" onclick="toggleDone(${e.id})"></div>` : ''}
          <div style="flex:1;min-width:0;">
            <div class="card-text${e.done?' done':''}">${esc(e.text)}</div>
            <div class="card-footer">
              <div class="card-left">
                <span class="card-tag ${e.cat}" onclick="showCatPicker(${e.id})">${cat.label}</span>
                <span class="pri-badge ${e.pri||'m'}">${PRI_LABELS[e.pri||'m']}</span>
                <span class="card-time">${fmtTime(e.ts)}</span>
              </div>
              <div class="card-actions">
                <button class="card-action-btn" onclick="editEntry(${e.id})" title="编辑"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                <button class="card-action-btn del" onclick="deleteEntry(${e.id})" title="归档"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }
  });
  list.innerHTML = html;
}
function setFilter(f) { currentFilter = f; document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.filter === f)); render(); }

// Summary with time ranges
let summaryRange = 'today';
let customStart = '', customEnd = '';

function getDateRange(range) {
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  switch (range) {
    case 'today': return { start: todayStart, end: Date.now(), label: '今日' };
    case 'week': { const w = new Date(now); w.setDate(w.getDate() - w.getDay()); w.setHours(0,0,0,0); return { start: w.getTime(), end: Date.now(), label: '本周' }; }
    case 'month': { const m = new Date(now.getFullYear(), now.getMonth(), 1); return { start: m.getTime(), end: Date.now(), label: '本月' }; }
    case 'custom': {
      if (!customStart || !customEnd) return { start: todayStart, end: Date.now(), label: '自定义' };
      return { start: new Date(customStart).getTime(), end: new Date(customEnd + 'T23:59:59').getTime(), label: `${customStart} ~ ${customEnd}` };
    }
    default: return { start: todayStart, end: Date.now(), label: '今日' };
  }
}

function showSummary() {
  const panel = document.getElementById('summaryPanel');
  const range = getDateRange(summaryRange);
  const rangeEntries = entries.filter(e => e.ts >= range.start && e.ts <= range.end);
  const counts = {}; Object.keys(CATS).forEach(k => counts[k] = []);
  rangeEntries.forEach(e => { if (counts[e.cat]) counts[e.cat].push(e); });
  const highPri = rangeEntries.filter(e => e.pri === 'h' && !e.done);
  const doneCount = rangeEntries.filter(e => e.done).length;
  const total = rangeEntries.length;

  let html = `<div class="panel-handle"></div>
    <div class="panel-title">复盘分析</div>
    <div class="panel-sub">${range.label} - 记录 ${total} 条${doneCount ? ` - 完成 ${doneCount} 件` : ''}</div>`;

  html += `<div class="time-tabs">${['today','week','month','custom'].map(r =>
    `<button class="time-tab${summaryRange===r?' active':''}" onclick="summaryRange='${r}';${r==='custom'?'':'showSummary();'}">${r==='today'?'今日':r==='week'?'本周':r==='month'?'本月':'自定义'}</button>`).join('')}</div>`;
  if (summaryRange === 'custom') {
    html += `<div class="custom-range">
      <input type="date" value="${customStart}" onchange="customStart=this.value">
      <span style="color:var(--text3);font-size:12px">至</span>
      <input type="date" value="${customEnd}" onchange="customEnd=this.value">
      <button class="sort-btn active" onclick="showSummary()">确定</button></div>`;
  }

  const insights = [];
  if (total === 0) insights.push('这段时间没有记录，大脑清空了也是好事。');
  if (highPri.length > 0) insights.push(`还有 ${highPri.length} 件高优先级事项未完成，建议优先处理`);
  if (counts.work.length > 3 && doneCount < counts.work.length) insights.push('工作任务较多但完成率偏低，聚焦最重要的 1-2 件');
  if (counts.life.length > 0 && counts.work.length === 0) insights.push('只记录了生活相关，工作的事也别忘了梳理');
  if (counts.learn.length > 0) insights.push('有学习记录，持续积累是最好的投资');
  if (counts.idea.length >= 3) insights.push('灵感较多，挑一个最有感觉的落地试试');
  if (counts.ai.length > 0) insights.push('有值得用 AI 探索的问题，挑一个动手试试');
  if (total > 10) insights.push('记录很多，说明你在积极思考');
  if (doneCount > 0 && total > 0) {
    const rate = Math.round(doneCount / total * 100);
    insights.push(`完成率 ${rate}%，${rate >= 80 ? '执行力很强' : rate >= 50 ? '还不错，继续加油' : '偏低，减少同时进行的任务'}`);
  }
  if (insights.length) html += `<div class="insight-box"><h4>洞察</h4>${insights.map(i => `<div class="insight-line">${i}</div>`).join('')}</div>`;

  const actions = [];
  highPri.forEach(e => actions.push({ text: e.text, source: '高优未完成' }));
  counts.work.filter(e => !e.done && e.pri === 'm').slice(0, 2).forEach(e => actions.push({ text: e.text, source: '工作中优先级' }));
  counts.learn.forEach(e => actions.push({ text: `继续深入：${e.text}`, source: '学习延续' }));
  counts.ai.forEach(e => actions.push({ text: `动手试试：${e.text}`, source: 'AI 探索' }));
  counts.idea.slice(0, 2).forEach(e => actions.push({ text: `评估可行性：${e.text}`, source: '想法筛选' }));
  if (actions.length) html += `<div class="panel-section"><h3>下一步建议 <span class="count-badge">${actions.length}</span></h3>${actions.map(a => `<div class="action-item"><div class="action-label">${a.source}</div>${esc(a.text)}</div>`).join('')}</div>`;

  const hasAny = Object.values(counts).some(c => c.length > 0);
  if (hasAny) {
    html += `<div class="panel-section"><h3>分类明细</h3>`;
    Object.entries(CATS).forEach(([k, v]) => {
      if (!counts[k].length) return;
      const done = counts[k].filter(e => e.done).length;
      html += `<div style="margin-bottom:8px"><div style="font-size:12px;color:var(--text2);margin-bottom:4px;">${v.label} (${counts[k].length}${done ? `/${done}完成` : ''})</div>`;
      counts[k].forEach(e => { html += `<div class="panel-item"${e.done?' style="opacity:0.5;text-decoration:line-through"':''}>${esc(e.text)} <span class="pri-badge ${e.pri||'m'}" style="font-size:9px">${PRI_LABELS[e.pri||'m']}</span></div>`; });
      html += '</div>';
    });
    html += '</div>';
  }
  html += `<div class="insight-box" style="margin-top:8px;"><h4>一句话</h4><div style="font-size:14px;line-height:1.8;color:var(--text2);">${getWisdom(rangeEntries)}</div></div>`;
  if (isConfigured && currentUser) html += `<button class="close-btn accent" style="margin-top:8px" onclick="bulkSync()">同步到云端</button>`;
  html += `<button class="close-btn" onclick="closePanel('summaryOverlay')">关闭</button>`;
  panel.innerHTML = html;
  document.getElementById('summaryOverlay').classList.add('open');
}

function getWisdom(es) {
  const hasWork = es.some(e => e.cat === 'work'), hasLife = es.some(e => e.cat === 'life'), hasLearn = es.some(e => e.cat === 'learn');
  const done = es.filter(e => e.done).length, total = es.length;
  if (total === 0) return '空白的一天也是新的开始，从写下一条待办开始。';
  if (done === total && total > 0) return '全部完成，执行力就是你的超能力。好好休息，继续前进。';
  if (done === 0 && total > 3) return '想得多做得少很正常，只挑一件最重要的，先动起来。';
  if (hasLearn) return '学习是对自己最好的投资，种下的种子，未来会开花。';
  if (hasWork && hasLife) return '工作和生活都在转，保持平衡不容易，但你已经在做了。';
  return '每一天的记录，都是成长的证据。坚持下去。';
}

// Export
let exportFmt = 'json', exportCats = Object.keys(CATS), exportRange = 'all';

function showExport() {
  const panel = document.getElementById('exportPanel');
  let html = `<div class="panel-handle"></div><div class="panel-title">导出数据</div><div class="panel-sub">选择格式和范围</div>`;
  html += `<div class="export-form"><label>导出格式</label><div class="export-opts">${['json','csv','excel'].map(f => `<button class="export-opt${exportFmt===f?' active':''}" onclick="exportFmt='${f}';showExport()">${f.toUpperCase()}</button>`).join('')}</div></div>`;
  html += `<div class="export-form"><label>时间范围</label><div class="export-opts">${['all','today','week','month'].map(r => `<button class="export-opt${exportRange===r?' active':''}" onclick="exportRange='${r}';showExport()">${r==='all'?'全部':r==='today'?'今日':r==='week'?'本周':'本月'}</button>`).join('')}</div></div>`;
  html += `<div class="export-form"><label>选择分类</label><div class="export-checks">
    <label class="export-check"><input type="checkbox" ${exportCats.length===Object.keys(CATS).length?'checked':''} onchange="toggleAllCats(this.checked)"> 全选</label>
    ${Object.entries(CATS).map(([k, v]) => `<label class="export-check"><input type="checkbox" value="${k}" ${exportCats.includes(k)?'checked':''} onchange="updateExportCats()"> ${v.label}</label>`).join('')}
  </div></div>`;
  html += `<button class="close-btn accent" onclick="doExport()">导出</button><button class="close-btn" onclick="closePanel('exportOverlay')">取消</button>`;
  panel.innerHTML = html;
  document.getElementById('exportOverlay').classList.add('open');
}
function toggleAllCats(checked) { exportCats = checked ? Object.keys(CATS) : []; showExport(); }
function updateExportCats() { exportCats = Array.from(document.querySelectorAll('.export-check input[value]:checked')).map(i => i.value); }

function getExportData() {
  let data = entries.filter(e => exportCats.includes(e.cat));
  if (exportRange !== 'all') { const r = getDateRange(exportRange); data = data.filter(e => e.ts >= r.start && e.ts <= r.end); }
  return data;
}

function doExport() {
  const data = getExportData();
  if (!data.length) { toast('没有符合条件的数据'); return; }
  const ds = new Date().toISOString().slice(0, 10);
  if (exportFmt === 'json') {
    downloadBlob(JSON.stringify(data, null, 2), `braindump_${ds}.json`, 'application/json');
  } else if (exportFmt === 'csv') {
    const rows = data.map(e => `"${CATS[e.cat]?.label||e.cat}","${PRI_LABELS[e.pri]||'中'}","${e.text.replace(/"/g,'""')}",${e.done?'是':'否'},"${new Date(e.ts).toLocaleString('zh-CN')}"`).join('\n');
    downloadBlob('\uFEFF分类,优先级,内容,完成,时间\n' + rows, `braindump_${ds}.csv`, 'text/csv;charset=utf-8');
  } else {
    let t = '<table><thead><tr><th>分类</th><th>优先级</th><th>内容</th><th>完成</th><th>时间</th></tr></thead><tbody>';
    data.forEach(e => { t += `<tr><td>${CATS[e.cat]?.label||e.cat}</td><td>${PRI_LABELS[e.pri]||'中'}</td><td>${esc(e.text)}</td><td>${e.done?'是':'否'}</td><td>${new Date(e.ts).toLocaleString('zh-CN')}</td></tr>`; });
    t += '</tbody></table>';
    downloadBlob(`<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body>${t}</body></html>`, `braindump_${ds}.xls`, 'application/vnd.ms-excel');
  }
  closePanel('exportOverlay');
  toast(`已导出 ${data.length} 条数据`);
}

function downloadBlob(content, filename, type) {
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([content], { type })); a.download = filename; a.click();
}
function closePanel(id) { document.getElementById(id).classList.remove('open'); }
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

render();
</script>
</body>
</html>
